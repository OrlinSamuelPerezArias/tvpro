<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    cursor: none;
    font-family: 'Segoe UI', Roboto, Arial;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  /* 🔊 OVERLAY INICIAL */
  #startOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 26px;
    text-align: center;
    z-index: 100;
    transition: opacity 0.5s ease;
  }

  /* 📺 BARRA DE INFO */
  #infoBar {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 25px 40px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
    color: white;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    z-index: 50;
  }

  #infoContent {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  #canalNum {
    font-size: 40px;
    font-weight: bold;
    color: #00c3ff;
  }

  #canalNombre {
    font-size: 22px;
    font-weight: 600;
  }

  #estado {
    font-size: 16px;
    opacity: 0.7;
  }

  * { user-select: none; outline: none; }
</style>
</head>

<body>

<div id="startOverlay">
  <div>
    <span style="font-size: 50px;">🔊</span><br>
    Presiona el número 1 para activar sonido
  </div>
</div>

<video id="player" autoplay muted playsinline></video>

<div id="infoBar">
  <div id="infoContent">
    <div id="canalNum"></div>
    <div>
      <div id="canalNombre"></div>
      <div id="estado"></div>
    </div>
  </div>
</div>

<script>
const canales = [
  // --- ESPIRITUALIDAD (PRIORIDAD) ---
  { nombre: "La Voz de María", url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8" },
  { nombre: "EWTN Español", url: "https://ewtn-es.akamaized.net/hls/spanish/index.m3u8" },

  // --- REPÚBLICA DOMINICANA ---
  { nombre: "Color Visión 9", url: "https://cv9.colorvision.com.do/live/playlist.m3u8" },
  { nombre: "Telemicro 5", url: "https://live4.telemicro.com.do/live/55/playlist.m3u8" },
  { nombre: "CDN 37", url: "https://cdn.cdndigital.com.do/live/cdn37/playlist.m3u8" },
  { nombre: "Antena 7", url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8" },
  { nombre: "Telesistema 11", url: "https://alba-do-telesistema-telesistema.stream.mediatiquestream.com/original.m3u8" },
  { nombre: "Digital 15", url: "https://live4.telemicro.com.do/live/15/playlist.m3u8" },
  { nombre: "Telecentro 13", url: "https://live4.telemicro.com.do/live/13/playlist.m3u8" },
  { nombre: "RTVD 4", url: "https://rtvd4.rtvd.gob.do/live/playlist.m3u8" },

  // --- NOTICIAS INTERNACIONALES ---
  { nombre: "RT en Español", url: "https://rt-esp.rt.com/hls/rt_esp/main.m3u8" },
  { nombre: "DW Español", url: "https://dwamdstream102.akamaized.net/hls/live/2015430/dwamdstream102/index.m3u8" },
  { nombre: "France 24", url: "https://static.france24.com/live/f24_es.video/playlist.m3u8" },
  { nombre: "EuroNews", url: "https://instrument-24258.live.mre.apple.com/playlist.m3u8" },
  { nombre: "Voz de América (VOA)", url: "https://voa-hls-702.akamaized.net/hls/live/2040051/702/master.m3u8" },

  // --- LATINOAMÉRICA ---
  { nombre: "Canal 26 Argentina", url: "https://live-p.canal26.com/directo/playlist.m3u8" },
  { nombre: "Venevisión (Venezuela)", url: "https://stream.adsplay.tv/venevision/index.m3u8" },
  { nombre: "Mileno TV (México)", url: "https://milenio-multimedios.amagi.tv/playlist.m3u8" },
  { nombre: "TeleSUR", url: "https://telesur.puresilva.com/telesur/index.m3u8" },

  // --- DOCUMENTALES Y CIENCIA ---
  { nombre: "NASA TV", url: "https://ntv.nasa.gov/hls/main/index.m3u8" },
  { nombre: "Amazing Nature", url: "https://amg01201-amg0120101-cineverse-us-4158.p.revry.tv/v1/master/92f7065963503875be4f29e92f25f2085375c327/AmazingNature-Cineverse/playlist.m3u8" },
  { nombre: "Red Bull TV", url: "https://rbmn-live.akamaized.net/hls/live/590964/fl_global/master.m3u8" }
];

let index = 0;
let hls;
const video = document.getElementById("player");
const overlay = document.getElementById("startOverlay");
const bar = document.getElementById("infoBar");

/* 📺 INTERFAZ ACTUALIZADA */
function mostrarBarra(txt = "En vivo") {
  document.getElementById("canalNum").innerText = (index + 1);
  document.getElementById("canalNombre").innerText = canales[index].nombre;
  document.getElementById("estado").innerText = txt;

  bar.style.transform = "translateY(0)";
  clearTimeout(bar.timer);
  bar.timer = setTimeout(() => bar.style.transform = "translateY(100%)", 3500);
}

/* 🎥 CARGA RÁPIDA (HLS OPTIMIZADO) */
function cargarCanal(i) {
  index = (i + canales.length) % canales.length;
  if (hls) hls.destroy();

  mostrarBarra("Sintonizando...");

  if (Hls.isSupported()) {
    hls = new Hls({
      capLevelToPlayerSize: true,
      lowLatencyMode: true,
      startLevel: -1,
      liveSyncDurationCount: 2 // Empieza reproducción más rápido
    });
    hls.loadSource(canales[index].url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = canales[index].url;
    video.play().catch(()=>{});
  }
}

/* 🔊 ACTIVACIÓN INSTANTÁNEA */
function activarTodo() {
  if (video.muted) {
    video.muted = false;
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.display = "none", 500);
  }
}

/* 🎮 CONTROL PARA DISCOVERY HOME */
function manejarControl(e) {
  // Captura inmediata para evitar lag del sistema
  e.stopImmediatePropagation();
  
  const code = e.keyCode;
  const key = e.key;

  // Desbloquea sonido con cualquier tecla
  activarTodo();

  // 1. Canal Siguiente (CH+, Flecha Arriba, PageUp)
  if ([33, 38, 427, 166].includes(code) || key === "ArrowUp" || key === "ChannelUp") {
    e.preventDefault();
    cargarCanal(index + 1);
  }
  // 2. Canal Anterior (CH-, Flecha Abajo, PageDown)
  else if ([34, 40, 428, 167].includes(code) || key === "ArrowDown" || key === "ChannelDown") {
    e.preventDefault();
    cargarCanal(index - 1);
  }
  // 3. Teclado Numérico
  else if (code >= 48 && code <= 57) {
    e.preventDefault();
    // Ajuste para que '1' sea índice 0, y '0' sea el canal 10 si existiera
    let n = (code === 48) ? 9 : (code - 49); 
    if (canales[n]) cargarCanal(n);
  }
}

// Usar 'keydown' en 'window' con captura activa para máxima velocidad
window.addEventListener("keydown", manejarControl, { capture: true });

/* 🔁 REINTENTO AUTOMÁTICO */
video.onerror = () => {
  setTimeout(() => cargarCanal(index), 3000);
};

window.onload = () => {
  cargarCanal(0);
  window.focus();
};
</script>

</body>
</html>
