<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO - Discovery Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
    cursor:none;
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
  }

  video {
    width:100vw;
    height:100vh;
    object-fit:cover;
  }

  /* 🔊 OVERLAY */
  #startOverlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    text-align:center;
    z-index:100;
  }

  /* 📺 BARRA DE INFO */
  #infoBar {
    position:absolute;
    bottom:0;
    width:100%;
    padding:30px;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    color:white;
    transform:translateY(100%);
    transition:transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    z-index:50;
  }

  #infoContent {
    display:flex;
    align-items:center;
    gap:20px;
  }

  #canalNum {
    font-size:45px;
    font-weight:bold;
    color:#00c3ff;
    text-shadow: 0 0 10px rgba(0,195,255,0.5);
  }

  #canalNombre {
    font-size:22px;
    font-weight:600;
  }

  #estado {
    font-size:16px;
    opacity:0.8;
  }

  /* 🧪 DEBUG PANEL */
  #debug {
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.7);
    color:#00ff00;
    padding:10px 15px;
    font-family: monospace;
    font-size:14px;
    border-radius:5px;
    z-index:1000;
    border: 1px solid #333;
  }

  * { user-select:none; outline: none; }
</style>
</head>

<body>

<div id="debug">Esperando señal de control...</div>

<div id="startOverlay">
  <div>
    <div style="font-size: 50px; margin-bottom: 10px;">📺</div>
    PRESIONA CUALQUIER TECLA<br>
    <span style="font-size:16px; opacity:0.6;">(Para activar video y sonido)</span>
  </div>
</div>

<video id="player" autoplay muted playsinline></video>

<div id="infoBar">
  <div id="infoContent">
    <div id="canalNum">1</div>
    <div>
      <div id="canalNombre">Cargando...</div>
      <div id="estado">Iniciando sistema</div>
    </div>
  </div>
</div>

<script>
const canales = [
  { nombre: "La Voz de María", url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8" },
  { nombre: "Telemicro", url: "https://live4.telemicro.com.do/live/55/playlist.m3u8" },
  { nombre: "Antena 7", url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8" }
];

let index = 0;
let hls;
const video = document.getElementById("player");
const overlay = document.getElementById("startOverlay");
const bar = document.getElementById("infoBar");
const debug = document.getElementById("debug");

/* 📺 MOSTRAR INTERFAZ */
function mostrarBarra(txt = "En vivo") {
  document.getElementById("canalNum").innerText = (index + 1);
  document.getElementById("canalNombre").innerText = canales[index].nombre;
  document.getElementById("estado").innerText = txt;

  bar.style.transform = "translateY(0)";
  clearTimeout(bar.timer);
  bar.timer = setTimeout(() => {
    bar.style.transform = "translateY(100%)";
  }, 4000);
}

/* 🎥 CARGAR STREAM */
function cargarCanal(i) {
  index = (i + canales.length) % canales.length;
  
  if (hls) hls.destroy();
  
  const url = canales[index].url;
  mostrarBarra("Cargando señal...");

  if (Hls.isSupported()) {
    hls = new Hls({
        manifestLoadingTimeOut: 10000,
        lowLatencyMode: true
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
            console.error("Error fatal de HLS, reintentando...");
            setTimeout(() => cargarCanal(index), 3000);
        }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }

  video.play().catch(e => console.log("Esperando interacción..."));
}

/* 🔊 DESBLOQUEAR AUDIO */
function desbloquearUI() {
  if (video.muted) {
    video.muted = false;
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.display = "none", 500);
    mostrarBarra("Audio activado");
  }
}

/* 🎮 LÓGICA DEL CONTROL REMOTO */
function manejarControl(e) {
  const key = e.key;
  const code = e.keyCode;

  // Debug visual
  debug.innerHTML = `TECLA: <span style="color:white">${key}</span> | CODE: <span style="color:white">${code}</span>`;

  // Desbloqueo inicial
  desbloquearUI();

  // 1. Cambio de canales (Flechas Arriba/Abajo o CH+/CH-)
  // Códigos 33, 34 son PageUp/Down. 38, 40 son Flechas. 427, 428 son Channel +/-
  if (code === 33 || code === 38 || code === 427 || key === "ArrowUp" || key === "ChannelUp") {
    cargarCanal(index + 1);
  } 
  else if (code === 34 || code === 40 || code === 428 || key === "ArrowDown" || key === "ChannelDown") {
    cargarCanal(index - 1);
  }

  // 2. Teclado numérico (0-9)
  // keyCodes 48-57 son los números en la mayoría de teclados y controles
  if (code >= 48 && code <= 57) {
    const numPresionado = code - 48;
    const i = numPresionado - 1; // Canal 1 es índice 0
    if (canales[i]) {
      cargarCanal(i);
    } else if (numPresionado === 0 && canales[9]) {
      cargarCanal(9); // Manejo del cero como canal 10
    }
  }
}

// Escuchar en window para capturar todo el foco de la TV
window.addEventListener("keydown", manejarControl);

// Iniciar primer canal al cargar
window.onload = () => {
  cargarCanal(0);
  // Forzar foco para que la TV reconozca las teclas
  window.focus();
};

/* 🔁 REINTENTO POR ERROR DE RED */
video.onerror = () => {
  mostrarBarra("Error de conexión... Reintentando");
  setTimeout(() => cargarCanal(index), 5000);
};
</script>

</body>
</html>
