<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  cursor:none;
  font-family:Arial;
}

video {
  width:100vw;
  height:100vh;
  object-fit:cover;
}

/* 📺 BARRA */
#infoBar {
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:20px 30px;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  color:white;
  transform:translateY(100%);
  transition:0.4s;
}

#canalNum { font-size:28px; font-weight:bold; }
#canalNombre { font-size:22px; }
#estado { font-size:16px; opacity:0.7; }

/* 🔊 BOTÓN INICIAL */
#startOverlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:28px;
  text-align:center;
  z-index:10;
}

#startBtn {
  padding:20px 40px;
  background:#1e90ff;
  border-radius:12px;
  font-size:26px;
}

* { user-select:none; }
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<!-- 🔊 OVERLAY INICIAL -->
<div id="startOverlay">
  <div id="startBtn">🔊 Presione OK para activar sonido</div>
</div>

<div id="infoBar">
  <div id="canalNum"></div>
  <div id="canalNombre"></div>
  <div id="estado"></div>
</div>

<script>
const canales = [
  {
    nombre: "La Voz de María",
    url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8"
  },
  {
    nombre: "Telemicro",
    url: "https://live4.telemicro.com.do/live/55/playlist.m3u8"
  },
  {
    nombre: "Antena 7",
    url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8"
  }
];

let index = 0;
let hls;
let retry = 0;

const video = document.getElementById("player");
const bar = document.getElementById("infoBar");
const num = document.getElementById("canalNum");
const nombre = document.getElementById("canalNombre");
const estado = document.getElementById("estado");
const startOverlay = document.getElementById("startOverlay");

/* 📺 BARRA */
function mostrarBarra(txt="En vivo"){
  num.innerText = "Canal " + (index+1);
  nombre.innerText = canales[index].nombre;
  estado.innerText = txt;

  bar.style.transform = "translateY(0)";
  clearTimeout(bar.timer);
  bar.timer = setTimeout(()=> bar.style.transform="translateY(100%)", 3000);
}

/* 🎥 CARGAR */
function cargarCanal(i){
  index = (i + canales.length) % canales.length;
  retry = 0;

  if (hls) hls.destroy();

  let url = canales[index].url;

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  } else if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  video.play().catch(()=>{});
  mostrarBarra("Cargando...");
}

/* 🔁 RECONEXIÓN */
video.onerror = () => {
  retry++;
  if (retry <= 3){
    mostrarBarra("Reconectando...");
    setTimeout(()=> video.load(),2000);
  } else {
    cargarCanal(index+1);
  }
};

video.onplaying = () => mostrarBarra("En vivo");

/* 🎮 CONTROL */
function manejarControl(e){
  const key = e.key || e.keyCode;

  if (key === "ArrowUp" || key === 38) cargarCanal(index+1);
  if (key === "ArrowDown" || key === 40) cargarCanal(index-1);

  if (key === "Enter" || key === 13){
    video.muted = false;
    startOverlay.style.display = "none";
    mostrarBarra("🔊 Sonido activado");
  }

  if (key === "Mute" || key === "VolumeMute"){
    video.muted = !video.muted;
    mostrarBarra(video.muted ? "🔇 Mute" : "🔊 Sonido");
  }
}

document.addEventListener("keydown", manejarControl);
document.addEventListener("keyup", manejarControl);

/* 🚫 MOUSE */
let mouseTimer;
document.addEventListener("mousemove", () => {
  document.body.style.cursor = "default";
  clearTimeout(mouseTimer);
  mouseTimer = setTimeout(()=> document.body.style.cursor="none",1000);
});

/* 📺 FULLSCREEN */
function fullscreen(){
  let el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

/* ▶️ INICIO */
window.onload = () => {
  fullscreen();
  cargarCanal(0);
};
</script>

</body>
</html>
