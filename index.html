<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; overflow:hidden; font-family:sans-serif;}
video { width:100vw; height:100vh; object-fit:cover; }

#overlay {
  position:absolute; bottom:20px; left:20px;
  color:white; background:rgba(0,0,0,0.6);
  padding:12px 16px; border-radius:12px;
  opacity:0; transition:0.3s;
}

#guide {
  position:absolute; top:0; left:0;
  width:320px; height:100%;
  background:rgba(0,0,0,0.95);
  color:white; overflow-y:auto;
  transform:translateX(-100%);
  transition:0.3s;
}

.channel { padding:10px; border-bottom:1px solid #333; }
.channel.active { background:#1e90ff; }
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>
<div id="overlay"></div>
<div id="guide"></div>

<script>
const canales = [
  {
    nombre: "La Voz de María",
    url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8"
  },
  {
    nombre: "Telemicro",
    url: "https://live4.telemicro.com.do/live/55/playlist.m3u8"
  },
  {
    nombre: "Antena 7",
    url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8"
  },
  {
    nombre: "Ready TV",
    url: "https://streaming.telecablecentral.com.do/ReadyTV/ReadyHD/playlist.m3u8"
  }
];

let index = parseInt(localStorage.getItem("last")) || 0;
let numeroBuffer = "";
let favoritos = JSON.parse(localStorage.getItem("fav") || "[]");

const video = document.getElementById("player");
const overlay = document.getElementById("overlay");
const guide = document.getElementById("guide");

let hls;
let retryCount = 0;

// 🎥 CARGAR CANAL
function cargarCanal(i){
  index = (i + canales.length) % canales.length;
  localStorage.setItem("last", index);
  retryCount = 0;

  if (hls) {
    hls.destroy();
  }

  const url = canales[index].url;

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  } else if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60
    });
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  video.muted = true;
  video.play();

  mostrar("📺 " + canales[index].nombre);
  renderGuide();
}

// 🔁 RECONEXIÓN INTELIGENTE
video.addEventListener("error", () => {
  retryCount++;

  if (retryCount <= 3) {
    mostrar("Reconectando...");
    setTimeout(() => {
      video.load();
      video.play();
    }, 2000);
  } else {
    mostrar("Canal no disponible");
    setTimeout(() => cargarCanal(index+1), 2000);
  }
});

// 📺 GUÍA
function renderGuide(){
  guide.innerHTML = "";
  canales.forEach((c,i)=>{
    let div = document.createElement("div");
    div.className = "channel" + (i===index?" active":"");
    div.innerText = (i+1)+" - "+c.nombre + (favoritos.includes(i)?" ❤️":"");
    guide.appendChild(div);
  });
}

// 🖥️ MENSAJES
function mostrar(txt){
  overlay.innerText = txt;
  overlay.style.opacity = 1;
  setTimeout(()=> overlay.style.opacity=0,2000);
}

// 🎮 CONTROL REMOTO
document.addEventListener("keydown",(e)=>{

  // números
  if(!isNaN(e.key)){
    numeroBuffer += e.key;
    mostrar("Canal: " + numeroBuffer);

    setTimeout(()=>{
      let n = parseInt(numeroBuffer)-1;
      if(canales[n]) cargarCanal(n);
      numeroBuffer="";
    },1000);
  }

  switch(e.key){

    case "ArrowUp":
    case "ArrowRight":
      cargarCanal(index+1); break;

    case "ArrowDown":
    case "ArrowLeft":
      cargarCanal(index-1); break;

    case "Enter":
      video.muted = false;
      mostrar("🔊 Sonido");
      break;

    case "m":
    case "Mute":
      video.muted = !video.muted;
      mostrar(video.muted?"🔇":"🔊");
      break;

    case "g":
      guide.style.transform = "translateX(0)";
      break;

    case "Escape":
      guide.style.transform = "translateX(-100%)";
      break;

    case "f":
      if(!favoritos.includes(index)) favoritos.push(index);
      else favoritos = favoritos.filter(x=>x!==index);

      localStorage.setItem("fav",JSON.stringify(favoritos));
      mostrar("⭐ Favorito");
      renderGuide();
      break;
  }

});

// ▶️ iniciar
cargarCanal(index);
</script>

</body>
</html>
