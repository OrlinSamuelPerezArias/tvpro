<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  cursor:none;
  font-family:'Segoe UI', Arial;
}

video {
  width:100vw;
  height:100vh;
  object-fit:cover;
}

/* 🔊 OVERLAY INICIAL */
#startOverlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  text-align:center;
  z-index:10;
}

/* 📺 BARRA PRO */
#infoBar {
  position:absolute;
  bottom:0;
  width:100%;
  padding:25px 40px;
  background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
  color:white;
  transform:translateY(100%);
  transition:0.4s ease;
}

/* CONTENIDO */
#infoContent {
  display:flex;
  align-items:center;
  gap:20px;
}

/* NUMERO GRANDE */
#canalNum {
  font-size:42px;
  font-weight:bold;
  color:#00c3ff;
}

/* TEXTO */
#textos {
  display:flex;
  flex-direction:column;
}

#canalNombre {
  font-size:24px;
  font-weight:600;
}

#estado {
  font-size:16px;
  opacity:0.7;
}

* { user-select:none; }
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<div id="startOverlay">
  🔊 Presiona el número 1 para activar sonido
</div>

<div id="infoBar">
  <div id="infoContent">
    <div id="canalNum"></div>
    <div id="textos">
      <div id="canalNombre"></div>
      <div id="estado"></div>
    </div>
  </div>
</div>

<script>
const canales = [
  {
    nombre: "La Voz de María",
    url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8"
  },
  {
    nombre: "Telemicro",
    url: "https://live4.telemicro.com.do/live/55/playlist.m3u8"
  },
  {
    nombre: "Antena 7",
    url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8"
  }
];

let index = 0;
let hls;
let retry = 0;

const video = document.getElementById("player");
const overlay = document.getElementById("startOverlay");

const bar = document.getElementById("infoBar");
const num = document.getElementById("canalNum");
const nombre = document.getElementById("canalNombre");
const estado = document.getElementById("estado");

/* 📺 MOSTRAR BARRA */
function mostrarBarra(txt="En vivo"){
  num.innerText = (index+1);
  nombre.innerText = canales[index].nombre;
  estado.innerText = txt;

  bar.style.transform = "translateY(0)";
  clearTimeout(bar.timer);
  bar.timer = setTimeout(()=> bar.style.transform="translateY(100%)", 3500);
}

/* 🎥 CARGAR CANAL */
function cargarCanal(i){
  index = (i + canales.length) % canales.length;
  retry = 0;

  if (hls) hls.destroy();

  let url = canales[index].url;

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  } else if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }

  video.play().catch(()=>{});
  mostrarBarra("Cargando...");
}

/* 🔁 ERROR */
video.onerror = () => {
  retry++;

  if (retry <= 3){
    mostrarBarra("Reconectando...");
    setTimeout(()=> video.load(),2000);
  } else {
    mostrarBarra("Canal no disponible");
    setTimeout(()=> cargarCanal(index+1),2000);
  }
};

video.onplaying = () => mostrarBarra("En vivo");

/* 🔊 ACTIVAR SONIDO */

function activarSonido(){
  video.muted = false;
  startOverlay.style.display = "none";
  mostrarBarra("🔊 Sonido activado");
}

  /* 🎮 CONTROL + DEBUG */
function manejarControl(e){
  const key = e.key;
  const code = e.keyCode;

 

  // 🔊 activar con cualquier botón
  activarSonido();

   // 🔼 Canal arriba
  if (key == "PageUp" || code == 33){
    cargarCanal(index+1);
  }

  // 🔽 Canal abajo
  if (key == "PageDown" || code == 34){
    cargarCanal(index-1);
}

document.addEventListener("keydown", manejarControl);
document.addEventListener("keyup", manejarControl);

/* 📺 FULLSCREEN */
function fullscreen(){
  let el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

/* ▶️ INICIO */
window.onload = () => {
  fullscreen();
  cargarCanal(0);
};
</script>

</body>
</html>
