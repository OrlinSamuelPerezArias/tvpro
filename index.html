<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  body { margin:0; background:black; overflow:hidden; cursor:none; font-family:'Segoe UI', Arial; }
  video { width:100vw; height:100vh; object-fit:cover; }
  #startOverlay {
    position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.85);
    display:flex; justify-content:center; align-items:center; color:white;
    font-size:22px; text-align:center; z-index:10; pointer-events:none;
  }
  #infoBar {
    position:absolute; bottom:0; width:100%; padding:20px 30px;
    background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    color:white; transform:translateY(100%); transition:0.4s ease; z-index:8;
  }
  #infoContent { display:flex; align-items:center; gap:15px; }
  #canalNum { font-size:32px; font-weight:bold; color:#00c3ff; }
  #canalNombre { font-size:18px; font-weight:600; }
  #estado { font-size:14px; opacity:0.7; }
  * { user-select:none; }
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<div id="startOverlay">
  🔊 Presiona cualquier tecla para activar sonido y navegar
</div>

<div id="infoBar">
  <div id="infoContent">
    <div id="canalNum"></div>
    <div>
      <div id="canalNombre"></div>
      <div id="estado"></div>
    </div>
  </div>
</div>

<script>
// Canales iniciales (locales)
let canales = [
  { nombre: "La Voz de María", url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8" },
  { nombre: "Telemicro", url: "https://live4.telemicro.com.do/live/55/playlist.m3u8" },
  { nombre: "Antena 7", url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8" }
];

let index = 0;
let hls;
let retry = 0;
let sonidoActivado = false;

const video = document.getElementById("player");
const overlay = document.getElementById("startOverlay");
const bar = document.getElementById("infoBar");
const num = document.getElementById("canalNum");
const nombre = document.getElementById("canalNombre");
const estado = document.getElementById("estado");

function mostrarBarra(txt = "En vivo") {
  num.innerText = (index + 1);
  nombre.innerText = canales[index].nombre;
  estado.innerText = txt;
  bar.style.transform = "translateY(0)";
  clearTimeout(bar.timer);
  bar.timer = setTimeout(() => bar.style.transform = "translateY(100%)", 3500);
}

function cargarCanal(i) {
  if (canales.length === 0) return;
  index = (i + canales.length) % canales.length;
  retry = 0;
  
  if (hls) hls.destroy();
  
  const url = canales[index].url;
  
  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }
  
  video.play().catch(() => {});
  mostrarBarra("Cargando...");
}

video.onerror = () => {
  retry++;
  if (retry <= 3) {
    mostrarBarra("Reconectando...");
    setTimeout(() => video.load(), 2000);
  } else {
    mostrarBarra("Canal no disponible");
    setTimeout(() => cargarCanal(index + 1), 2000);
  }
};

video.onplaying = () => mostrarBarra("En vivo");

function activarSonido() {
  if (!sonidoActivado) {
    video.muted = false;
    overlay.style.display = "none";
    sonidoActivado = true;
    mostrarBarra("🔊 Sonido activado");
  }
}

function manejarControl(e) {
  const key = e.key.toLowerCase();
  const keyCode = e.keyCode; // Mantenemos keyCode sin toLowerCase()

  activarSonido();

  // SIGUIENTE CANAL (Uso de === estricto)
  if (key === "arrowup" || key === "pageup" || keyCode === 38 || keyCode === 33) {
    cargarCanal(index + 1);
    e.preventDefault();
  }

  // CANAL ANTERIOR
  if (key === "arrowdown" || key === "pagedown" || keyCode === 40 || keyCode === 34) {
    cargarCanal(index - 1);
    e.preventDefault();
  }
}

document.addEventListener("keydown", manejarControl, true);

// 📡 CARGAR DESDE TV.JSON LOCAL
async function cargarCanalesDesdeJSON() {
  try {
    const urlRaw = "https://raw.githubusercontent.com/OrlinSamuelPerezArias/tvpro/main/tv.json";
    const res = await fetch(urlRaw);
    
    if (!res.ok) throw new Error(`Error HTTP: ${res.status}`);

    const datosJSON = await res.json();
    const canalesExtraidos = [];

    // Navegamos por la estructura: countries -> ambits -> channels
    if (datosJSON.countries && Array.isArray(datosJSON.countries)) {
      datosJSON.countries.forEach(pais => {
        if (pais.ambits && Array.isArray(pais.ambits)) {
          pais.ambits.forEach(ambito => {
            if (ambito.channels && Array.isArray(ambito.channels)) {
              
              ambito.channels.forEach(canal => {
                // Buscamos la primera opción que tenga una URL válida
                const primeraOpcion = canal.options && canal.options.find(opt => opt.url);
                
                if (primeraOpcion) {
                  canalesExtraidos.push({
                    nombre: canal.name,
                    url: primeraOpcion.url,
                    logo: canal.logo,
                    categoria: ambito.name, // "Generalistas", "Informativos", etc.
                    pais: pais.name,
                    alternativas: canal.options // Para el Plan B
                  });
                }
              });

            }
          });
        }
      });
    }

    // Actualizamos la lista global
    canales = [...canales, ...canalesExtraidos];
    
    console.log(`✅ ${canalesExtraidos.length} canales importados desde tv.json`);
    
    // Si tienes una función para mostrar la lista en pantalla, llámala aquí
    // actualizarInterfaz(); 

  } catch (e) {
    console.error("❌ Error procesando el JSON:", e.message);
  }
}
function fullscreen() {
  let el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}

window.onload = async () => {
  // Primero cargamos los canales del JSON
  await cargarCanalesDesdeJSON();
  
  // Luego iniciamos el primer canal
  cargarCanal(0);
  console.log("🎬 TV PRO iniciado con", canales.length, "canales");
};
</script>

</body>
</html>
