<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  cursor:none;
  font-family:Arial, sans-serif;
}

video {
  width:100vw;
  height:100vh;
  object-fit:cover;
}

/* 📺 BARRA TIPO TV */
#infoBar {
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:20px 30px;
  background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
  color:white;
  transform:translateY(100%);
  transition:0.4s ease;
}

/* CONTENIDO */
#canalNum {
  font-size:28px;
  font-weight:bold;
}

#canalNombre {
  font-size:22px;
  opacity:0.9;
}

#estado {
  font-size:16px;
  opacity:0.7;
  margin-top:5px;
}

* {
  user-select:none;
}
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<div id="infoBar">
  <div id="canalNum"></div>
  <div id="canalNombre"></div>
  <div id="estado"></div>
</div>

<script>
const canales = [
  {
    nombre: "La Voz de María",
    url: "https://live.lavozdemaria.com:3436/live/lavozdemarialive.m3u8"
  },
  {
    nombre: "Telemicro",
    url: "https://live4.telemicro.com.do/live/55/playlist.m3u8"
  },
  {
    nombre: "Antena 7",
    url: "https://alba-do-antena7-antena7.stream.mediatiquestream.com/original.m3u8"
  },
  {
    nombre: "Ready TV",
    url: "https://streaming.telecablecentral.com.do/ReadyTV/ReadyHD/playlist.m3u8"
  }
];

let index = 0;
let hls;
let retry = 0;

const video = document.getElementById("player");
const bar = document.getElementById("infoBar");
const num = document.getElementById("canalNum");
const nombre = document.getElementById("canalNombre");
const estado = document.getElementById("estado");

/* 📺 MOSTRAR BARRA */
function mostrarBarra(textoEstado="En vivo") {
  num.innerText = "Canal " + (index + 1);
  nombre.innerText = canales[index].nombre;
  estado.innerText = textoEstado;

  bar.style.transform = "translateY(0)";

  clearTimeout(bar.timer);
  bar.timer = setTimeout(() => {
    bar.style.transform = "translateY(100%)";
  }, 3500);
}

/* 🎥 CARGAR CANAL */
function cargarCanal(i){
  index = (i + canales.length) % canales.length;
  retry = 0;

  if (hls) hls.destroy();

  const url = canales[index].url;

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  } else if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  video.muted = true;
  video.play();

  mostrarBarra("Cargando...");
}

/* 🔁 RECONEXIÓN */
video.addEventListener("error", () => {
  retry++;

  if (retry <= 3) {
    mostrarBarra("Reconectando...");
    setTimeout(() => {
      video.load();
      video.play();
    }, 2000);
  } else {
    mostrarBarra("Canal no disponible");
    setTimeout(() => cargarCanal(index + 1), 2000);
  }
});

/* ▶️ CUANDO YA ESTÁ LISTO */
video.addEventListener("playing", () => {
  mostrarBarra("En vivo");
});

/* 🎮 CONTROL REMOTO */
document.addEventListener("keydown",(e)=>{

  const key = e.key || e.keyCode;

  switch(key){

    case "ArrowUp":
    case 38:
    case "ChannelUp":
      cargarCanal(index+1);
      break;

    case "ArrowDown":
    case 40:
    case "ChannelDown":
      cargarCanal(index-1);
      break;

    case "Enter":
    case 13:
      video.muted = false;
      mostrarBarra("🔊 Sonido activado");
      break;

    case "Mute":
    case "VolumeMute":
      video.muted = !video.muted;
      mostrarBarra(video.muted ? "🔇 Mute" : "🔊 Sonido");
      break;
  }

});

/* 📺 PANTALLA COMPLETA */
function pantallaCompleta() {
  const elem = document.documentElement;

  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}

/* ▶️ INICIO */
window.onload = () => {
  pantallaCompleta();
  cargarCanal(0);
};
</script>

</body>
</html>
